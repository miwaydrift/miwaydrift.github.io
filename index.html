function getCombinedDirs(route) {
  if (route.i !== '1') return [];

function isHeaderStep(rawOrFormatted) {
  if (!rawOrFormatted) return false;
  var t = String(rawOrFormatted).trim();
  // Manual marker: leading "**"

  html += '<div style="padding:10px 12px">';
  stepsToRender.forEach((item, animIdx) => {

      html += `<div style="display:flex;align-items:center;gap:10px;margin:12px 0;padding:12px 14px;background:${C.amberBg};border:1.5px solid ${C.amberBorder};border-radius:12px">
        <div style="font-size:20px">&#128260;</div>
        <div><div style="font-size:12px;font-weight:800;color:${C.amber};letter-spacing:0.5px">CONTINUES FROM ${esc(item.label.toUpperCase())}</div>

    }

    const step = item.step, idx = item.idx, curDi = item.dirIdx;
    const tp = gt(step), orig = gf(step), k = nk(sel.i, curDi, idx);

    const isHeader = isHeaderStep(step) || isHeaderStep(tx);

    const isClassic = styleMode === 'classic';

    html += `<div style="margin-bottom:6px;border-radius:14px;overflow:hidden;background:${bg};border:${brd};box-shadow:${C.shadow}">
      <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px">`;

    if (isClassic) {
      html += `<div style="display:flex;flex-direction:column;align-items:center;min-width:42px;flex-shrink:0">

      if (isHeader) html += `<div style="width:36px;height:36px;border-radius:10px;background:${C.amberBg};display:flex;align-items:center;justify-content:center;font-size:18px;color:${C.amber}">&#9873;</div>`;
      else if (tp === 'right') html += `<div style="width:36px;height:36px;border-radius:10px;background:rgba(22,163,74,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;color:${C.green}">&#10145;</div>`;
      else if (tp === 'left') html += `<div style="width:36px;height:36px;border-radius:10px;background:rgba(220,38,38,0.08);display:flex;align-items:center;justify-content:center;font-size:20px;color:${C.red}">&#11013;</div>`;
      else html += `<div style="width:36px;height:36px;border-radius:10px;background:${C.accentSoft};display:flex;align-items:center;justify-content:center"><div style="width:8px;height:8px;border-radius:50%;background:${C.accent}"></div></div>`;
      html += '</div>';
    }

    html += '<div style="flex:1">';
    if (isClassic && !isHeader && tp !== 'action') html += `<div style="font-size:11px;font-weight:800;letter-spacing:0.8px;color:${tp === 'right' ? C.green : C.red};margin-bottom:4px">${tp === 'right' ? 'TURN RIGHT' : 'TURN LEFT'}</div>`;

    if (es_key === k) {
      html += `<div><textarea id="guide-edit-ta" rows="2" style="width:100%;box-sizing:border-box;padding:8px;border-radius:8px;border:1.5px solid ${C.accent};background:${C.surface};color:${C.text};font-size:${fs}px;font-weight:600;resize:vertical;outline:none;font-family:inherit;line-height:1.4">${esc(et_val)}</textarea>
        <div style="display:flex;gap:6px;margin-top:5px">
          <button id="guide-edit-save" style="padding:6px 14px;border-radius:8px;background:${C.accent};border:none;color:#fff;font-weight:700;font-size:12px;cursor:pointer">Save</button>
          <button id="guide-edit-cancel" style="padding:6px 14px;border-radius:8px;background:${C.surface};border:1.5px solid ${C.border};color:${C.textSoft};font-weight:600;font-size:12px;cursor:pointer">Cancel</button>
          ${isEd ? `<button id="guide-edit-revert" style="padding:6px 14px;border-radius:8px;background:${C.surface};border:1.5px solid ${C.redBorder};color:${C.red};font-weight:600;font-size:12px;cursor:pointer">Revert</button>` : ''}
        </div></div>`;
    } else {
      var headerWeight = isHeader ? '900' : '600';
      var headerColor = isHeader ? C.amber : C.text;
      var headerSize = isHeader ? Math.max(fs, fs + 1) : fs;
      html += `<div style="font-size:${headerSize}px;font-weight:${headerWeight};line-height:1.4;color:${headerColor};${isHeader ? 'letter-spacing:0.3px;' : ''}">${(!isHeader && !isClassic) ? lrPrefix : ''}${esc(tx)}${isEd ? `<span style="font-size:10px;color:${C.accent};margin-left:6px;font-weight:700;vertical-align:super;background:${C.accentSoft};padding:2px 6px;border-radius:4px">EDITED</span>` : ''}</div>`;
    }

    html += '</div>';
    if (es_key !== k) {
      html += `<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">
        <button class="guide-edit-btn" data-k="${esc(k)}" data-tx="${esc(tx)}" data-di="${curDi}" data-idx="${idx}" style="background:transparent;border:none;padding:4px;cursor:pointer;color:${C.textMuted};font-size:14px;opacity:0.5" title="Edit">&#9998;</button>
        <button class="guide-del-btn" data-k="${esc(k)}" data-di="${curDi}" data-idx="${idx}" style="background:transparent;border:none;padding:4px;cursor:pointer;color:${C.textMuted};font-size:12px;opacity:0.35" title="Delete">&#128465;</button>
      </div>`;
    }
    html += '</div>';

    if (hn) html += `<div style="padding:10px 14px${isClassic ? ' 10px 66px' : ''};background:${C.amberBg};border-top:1px solid ${C.amberBorder};font-size:${Math.max(14, fs - 3)}px;color:${C.amber};font-style:italic;line-height:1.35">&#128204; ${esc(hn)}</div>`;
    html += '</div>';
  });

  // Print picker overlay
  if (pp) {
    const is2dir = pp.layout === '2dir';
    const slotLabels = ['Page 1 · Left','Page 1 · Right','Page 2 · Left','Page 2 · Right'];
    const slotColors = [C.accent,C.accent,C.green,C.green];
    const slotBgs   = [C.accentSoft,C.accentSoft,C.greenBg,C.greenBg];
    const slotBrds  = [C.accentBorder,C.accentBorder,C.greenBorder,C.greenBorder];
    html += `<div id="picker-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:100;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px">
      <div style="background:${C.card};border-radius:24px;padding:20px;width:100%;max-width:400px;border:1px solid ${C.border};box-shadow:${C.shadowLg};margin:auto">
        <div style="font-family:'Outfit',sans-serif;font-size:19px;font-weight:800;color:${C.text};margin-bottom:12px;text-align:center">Print Layout</div>
        <div style="font-size:10px;font-weight:700;color:${C.textMuted};letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px">Page Layout</div>
        <div style="display:flex;gap:6px;margin-bottom:14px">`;
    [['2col','Print','&#9635;'],['2dir','Print\nSide by Side','&#9638;']].forEach(([mode,lbl,icon]) => {
      const isAct = pp.layout === mode;
      html += `<button class="pp-layout" data-mode="${mode}" style="flex:1;padding:10px 6px;border-radius:12px;border:${isAct ? `2.5px solid ${C.accent}` : `1.5px solid ${C.border}`};background:${isAct ? C.accentSoft : C.surface};cursor:pointer;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">${icon}</div>
        <div style="font-size:10px;font-weight:700;color:${isAct ? C.accent : C.textSoft};white-space:pre-line;line-height:1.3">${lbl}</div>
      </button>`;
    });
    html += `</div>`;

    if (is2dir) {
      html += `<div style="font-size:11px;color:${C.textMuted};margin-bottom:14px;text-align:center">Tap a slot → tap a direction to assign</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">`;
      pp.s.forEach((v, si) => {
        const isAct = pp.a === si;
        const sc = slotColors[si], sb = slotBgs[si], sbr = slotBrds[si];
        const dirName = v !== null ? esc(sel.d[v].l) : '<span style="opacity:0.4">— empty —</span>';
        html += `<button class="pp-slot" data-slot="${si}" style="padding:10px;border-radius:12px;border:${isAct ? `2.5px solid ${sc}` : `1.5px solid ${sbr}`};background:${isAct ? sb : C.surface};cursor:pointer;text-align:left">
          <div style="font-size:9px;font-weight:800;letter-spacing:0.8px;color:${sc};margin-bottom:4px;text-transform:uppercase">${slotLabels[si]}</div>
          <div style="font-size:12px;font-weight:700;color:${isAct ? sc : C.textSoft}">${dirName}</div>
          ${isAct ? `<div style="font-size:9px;color:${sc};margin-top:3px;font-weight:600">▼ pick below</div>` : ''}
        </button>`;
      });
      html += `</div>
        <div style="font-size:10px;font-weight:700;color:${C.textMuted};letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px">Directions</div>
        <div style="margin-bottom:14px">
          <button class="pp-dir" data-i="-1" style="display:block;width:100%;padding:9px 12px;margin-bottom:5px;border-radius:9px;border:1.5px solid ${C.redBorder};background:${C.surface};color:${C.red};font-weight:700;font-size:12px;cursor:pointer;text-align:left">&#10005; Clear slot</button>`;
      sel.d.forEach((d, i) => {
        if (sel.i === '1' && d.l.includes('Campus')) return;
        const inSlot = pp.s.indexOf(i);
        const slotTag = inSlot !== -1 ? ` <span style="font-size:10px;font-weight:800;background:${slotColors[inSlot]};color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px">${slotLabels[inSlot]}</span>` : '';
        html += `<button class="pp-dir" data-i="${i}" style="display:flex;align-items:center;width:100%;padding:9px 12px;margin-bottom:5px;border-radius:9px;border:1.5px solid ${inSlot !== -1 ? slotColors[inSlot] : C.border};background:${inSlot !== -1 ? slotBgs[inSlot] : C.card};color:${inSlot !== -1 ? slotColors[inSlot] : C.textSoft};font-weight:700;font-size:12px;cursor:pointer;text-align:left">${esc(d.l)}${slotTag}</button>`;
      });
      html += `</div>`;
    } else {
      html += `<div style="font-size:11px;color:${C.textMuted};margin-bottom:10px;text-align:center">Tap directions to select (each prints on its own page)</div>
        <div style="margin-bottom:14px">`;
      sel.d.forEach((d, i) => {
        if (sel.i === '1' && d.l.includes('Campus')) return;
        const slotIdx = pp.s.indexOf(i);
        const picked = slotIdx !== -1;
        const orderNum = slotIdx + 1;
        html += `<button class="pp-dir-single" data-i="${i}" style="display:flex;align-items:center;width:100%;padding:10px 12px;margin-bottom:5px;border-radius:9px;border:1.5px solid ${picked ? C.accent : C.border};background:${picked ? C.accentSoft : C.card};color:${picked ? C.accent : C.textSoft};font-weight:700;font-size:13px;cursor:pointer;text-align:left">${picked ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:' + C.accent + ';color:#fff;font-size:11px;font-weight:800;margin-right:8px;flex-shrink:0">' + orderNum + '</span>' : ''}${esc(d.l)}${picked ? '<span style="font-size:10px;color:' + C.accent + ';margin-left:auto;font-weight:600">Page ' + orderNum + '</span>' : ''}</button>`;
      });
      html += `</div>`;
    }

    const canPrint = pp.s[0] !== null || pp.s[1] !== null;
    html += `<div style="display:flex;gap:8px">
          <button id="pp-print" ${canPrint ? '' : 'disabled'} style="flex:1;padding:13px;border-radius:13px;background:${canPrint ? 'linear-gradient(135deg,#2563eb,#1d4ed8)' : '#ccc'};border:none;color:#fff;font-weight:800;font-size:14px;cursor:${canPrint ? 'pointer' : 'default'};box-shadow:${canPrint ? '0 4px 15px rgba(37,99,235,0.2)' : 'none'}">&#128424; Print</button>
          <button id="pp-cancel" style="padding:13px 20px;border-radius:13px;background:${C.surface};border:1.5px solid ${C.border};color:${C.textSoft};font-weight:600;font-size:14px;cursor:pointer">Cancel</button>
        </div></div></div>`;
  }

  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
  bindTabs();
  bindDetailEvents();
}

function bindDetailEvents() {
  const btn = id => document.getElementById(id);
  if (btn('btn-back')) btn('btn-back').addEventListener('click', () => { view = 'list'; sel = null; q = ''; combinedView = null; es_key = null; render(); });
  document.querySelectorAll('.dir-tab').forEach(t => t.addEventListener('click', function () { di = parseInt(this.dataset.di); combinedView = null; es_key = null; render(); }));
  if (btn('btn-fs-down')) btn('btn-fs-down').addEventListener('click', () => { fs = Math.max(14, fs - 2); render(); });
  if (btn('btn-fs-up')) btn('btn-fs-up').addEventListener('click', () => { fs = Math.min(30, fs + 2); render(); });
  if (btn('style-compact')) btn('style-compact').addEventListener('click', () => setStyleMode('compact'));
  if (btn('style-classic')) btn('style-classic').addEventListener('click', () => setStyleMode('classic'));
  if (btn('btn-print-both')) btn('btn-print-both').addEventListener('click', () => { const vi = sel.d.map((d,i)=>i).filter(i => !(sel.i==='1' && sel.d[i].l.includes('Campus'))); pp = { s: [vi[0]??null, vi[1]??null, vi[2]??null, vi[3]??null], a: 0, layout: '2dir' }; render(); });
  // Guide edit buttons
  document.querySelectorAll('.guide-edit-btn').forEach(b => b.addEventListener('click', function () {
    es_key = this.dataset.k; et_val = this.dataset.tx; render();
  }));
  if (btn('guide-edit-ta')) btn('guide-edit-ta').addEventListener('input', function () { et_val = this.value; });
  if (btn('guide-edit-save')) btn('guide-edit-save').addEventListener('click', function () {
    if (et_val.trim()) edits[es_key] = et_val.trim();
    es_key = null; et_val = ''; render();
  });
  if (btn('guide-edit-cancel')) btn('guide-edit-cancel').addEventListener('click', function () {
    es_key = null; et_val = ''; render();
  });
  if (btn('guide-edit-revert')) btn('guide-edit-revert').addEventListener('click', function () {
    delete edits[es_key]; es_key = null; et_val = ''; render();
  });
  // Guide delete buttons
  document.querySelectorAll('.guide-del-btn').forEach(b => b.addEventListener('click', function () {
    if (!this.dataset.confirmPending) {
      this.dataset.confirmPending = '1';
      this.innerHTML = '&#10003;';
      this.style.opacity = '1';
      this.style.color = C.red;
      setTimeout(() => { if (this.dataset.confirmPending) { delete this.dataset.confirmPending; render(); } }, 2000);
      return;
    }
    delete this.dataset.confirmPending;
    hid[this.dataset.k] = true;
    render();
  }));
  if (btn('pp-cancel')) btn('pp-cancel').addEventListener('click', () => { pp = null; render(); });
  if (btn('pp-print')) btn('pp-print').addEventListener('click', () => { if (!pp || (pp.s[0]===null && pp.s[1]===null)) return; const slots = pp.s.slice(); const layout = pp.layout; pp = null; doPrint(slots, layout); });
  document.querySelectorAll('.pp-layout').forEach(b => b.addEventListener('click', function () { if (!pp) return; pp.layout = this.dataset.mode; pp.s = [null,null,null,null]; pp.a = 0; render(); }));
  document.querySelectorAll('.pp-slot').forEach(b => b.addEventListener('click', function () { if (!pp) return; pp.a = parseInt(this.dataset.slot); render(); }));
  document.querySelectorAll('.pp-dir').forEach(b => b.addEventListener('click', function () {
    if (!pp) return;
    const idx = parseInt(this.dataset.i);
    if (idx === -1) { pp.s[pp.a] = null; }
    else { const existing = pp.s.indexOf(idx); if (existing !== -1 && existing !== pp.a) pp.s[existing] = null; pp.s[pp.a] = idx; }
    pp.a = (pp.a + 1) % 4;
    render();
  }));
  document.querySelectorAll('.pp-dir-single').forEach(b => b.addEventListener('click', function () {
    if (!pp) return;
    const idx = parseInt(this.dataset.i);
    // Toggle: if already selected remove it, otherwise add to next empty slot
    const existing = pp.s.indexOf(idx);
    if (existing !== -1) {
      pp.s[existing] = null;
      // Compact: shift non-nulls to front
      const picked = pp.s.filter(x => x !== null);
      pp.s = [picked[0]??null, picked[1]??null, picked[2]??null, picked[3]??null];
    } else {
      const emptySlot = pp.s.indexOf(null);
      if (emptySlot !== -1) pp.s[emptySlot] = idx;
    }
    render();
  }));
}

function saveNote() {
  if (!en) return;
  if (nt_val.trim()) notes[en] = nt_val.trim(); else delete notes[en];
  en = null; nt_val = ''; render();
}

      <div style="margin-top:10px"><button id="btn-bulk" style="width:100%;padding:10px 14px;border-radius:10px;background:${C.accentSoft};border:1.5px dashed ${C.accentBorder};color:${C.accent};font-weight:700;font-size:13px;cursor:pointer">&#128196; Paste PDF text to bulk update routes</button></div>

      <div style="min-width:54px;height:54px;background:${rc > 0 ? `linear-gradient(135deg,${C.amber},#b45309)` : 'linear-gradient(145deg,#2563eb,#3b82f6)'};border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;box-shadow:${C.shadow};position:relative;overflow:hidden"><span style="position:absolute;bottom:1px;right:3px;font-size:5px;font-weight:400;color:rgba(255,255,255,0.09);pointer-events:none">GS</span>${esc(r.i)}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:16px">${esc(r.n)}</div>
      <div style="font-size:12px;color:${rc > 0 ? C.amber : C.textMuted};margin-top:2px">${rc > 0 ? rc + ' step' + (rc > 1 ? 's' : '') + ' edited &middot; ' : ''}${esc(r.s)} &middot; ${r.d.length} dir.</div></div>

/* ═══ EDITOR DETAIL ═══ */
function renderEditorDetail() {

function bindEditorDetailEvents() {
  const btn = id => document.getElementById(id);
  if (btn('btn-export-detail')) btn('btn-export-detail').addEventListener('click', exportFile);
  if (btn('btn-editor-back')) btn('btn-editor-back').addEventListener('click', () => { view = 'editor'; editorStepIdx = null; render(); });
  document.querySelectorAll('.editor-dir-tab').forEach(t => t.addEventListener('click', function () { editorDi = parseInt(this.dataset.di); editorStepIdx = null; render(); }));
  document.querySelectorAll('.btn-estep-edit').forEach(b => b.addEventListener('click', function () {
    editorStepIdx = parseInt(this.dataset.idx); editorStepVal = this.dataset.tx; render();
  }));
  document.querySelectorAll('.btn-estep-toggle-header').forEach(b => b.addEventListener('click', function () {
    var stepIdx = parseInt(this.dataset.idx);
    var useDi = parseInt(this.dataset.dir || editorDi);
    var r = editorSel;
    var cur = r.d[useDi].t[stepIdx];
    var newStep;
    if (cur.trim().startsWith('**')) {
      // Remove the manual header marker
      newStep = cur.replace(/^\s*\*\*\s*/, '');
    } else {
      // Add manual header marker (preserves any L~/R~ prefix)
      newStep = '**' + cur;
    }
    r.d[useDi].t[stepIdx] = newStep;
    editorChanges[r.i + '-' + useDi + '-' + stepIdx] = newStep;
    render();
  }));
  document.querySelectorAll('.btn-estep-delete').forEach(b => b.addEventListener('click', function () {
    const stepIdx = parseInt(this.dataset.idx);
    // Show inline confirmation
    if (!this.dataset.confirmPending) {
      this.dataset.confirmPending = '1';
      this.innerHTML = '&#10003; Sure?';
      this.style.background = C.red;
      this.style.color = '#fff';
      this.style.opacity = '1';
      setTimeout(() => { if (this.dataset.confirmPending) { delete this.dataset.confirmPending; render(); } }, 3000);
      return;
    }
    delete this.dataset.confirmPending;
    const r = editorSel; const useDi = parseInt(this.dataset.dir || editorDi); r.d[useDi].t.splice(stepIdx, 1);
    const prefix = r.i + '-' + useDi + '-';
    const newChanges = {};
    Object.keys(editorChanges).forEach(k => {
      if (!k.startsWith(prefix)) { newChanges[k] = editorChanges[k]; return; }
      const si = parseInt(k.split('-')[2]);
      if (si === stepIdx) return;
      if (si > stepIdx) newChanges[prefix + (si - 1)] = editorChanges[k];
      else newChanges[k] = editorChanges[k];
    });
    editorChanges = newChanges; editorStepIdx = null; render();
  }));
  document.querySelectorAll('.pfx-btn').forEach(b => b.addEventListener('click', function () {
    const pfx = this.dataset.pfx;
    var raw = editorSel.d[editorDi].t[editorStepIdx];
    var hdrPfx = raw.trim().startsWith('**') ? '**' : '';
    editorSel.d[editorDi].t[editorStepIdx] = hdrPfx + pfx + (editorStepVal || gf(raw));
    render();
  }));
  if (btn('edit-step-ta')) btn('edit-step-ta').addEventListener('input', function () { editorStepVal = this.value; });
  if (btn('btn-estep-save')) btn('btn-estep-save').addEventListener('click', function () {
    const idx = parseInt(this.dataset.idx); const r = editorSel; const d = r.d[editorDi];
    const curStep = d.t[idx];
    var stripped = curStep.trim().startsWith('**') ? curStep.replace(/^\s*\*\*\s*/, '') : curStep;
    const hdrPfx = curStep.trim().startsWith('**') ? '**' : '';
    const pfx = stripped.trim().startsWith('R~ ') ? 'R~ ' : stripped.trim().startsWith('L~ ') ? 'L~ ' : stripped.trim().startsWith('R~') ? 'R~' : stripped.trim().startsWith('L~') ? 'L~' : '';
    const newStep = hdrPfx + pfx + editorStepVal.trim(); d.t[idx] = newStep;
    editorChanges[r.i + '-' + editorDi + '-' + idx] = newStep;
    editorStepIdx = null; editorStepVal = ''; render();
  });
  if (btn('btn-estep-cancel')) btn('btn-estep-cancel').addEventListener('click', () => { editorStepIdx = null; editorStepVal = ''; render(); });
  if (btn('btn-estep-revert')) btn('btn-estep-revert').addEventListener('click', function () { revertStep(parseInt(this.dataset.idx)); });
  document.querySelectorAll('.btn-estep-revert-quick').forEach(b => b.addEventListener('click', function () { revertStep(parseInt(this.dataset.idx)); }));
  document.querySelectorAll('.btn-add-step').forEach(b => b.addEventListener('click', function () {
    const after = parseInt(this.dataset.after);
    const addDi = parseInt(this.dataset.dir || editorDi);
    // Show inline input
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'padding:8px 12px;background:' + C.amberBg + ';border:1.5px solid ' + C.amberBorder + ';border-radius:12px;margin:6px 0';
    wrapper.innerHTML = '<div style="font-size:12px;font-weight:700;color:' + C.amber + ';margin-bottom:6px">New step (include R~ or L~ prefix if needed):</div>'
      + '<textarea id="add-step-ta" rows="2" style="width:100%;box-sizing:border-box;padding:10px;border-radius:10px;border:1.5px solid ' + C.amberBorder + ';background:' + C.card + ';color:' + C.text + ';font-size:15px;resize:vertical;outline:none;font-family:inherit;line-height:1.4"></textarea>'
      + '<div style="display:flex;gap:6px;margin-top:6px">'
      + '<button id="add-step-ok" style="flex:1;padding:9px;border-radius:10px;background:' + C.amber + ';border:none;color:#fff;font-weight:800;font-size:14px;cursor:pointer">Add Step</button>'
      + '<button id="add-step-no" style="padding:9px 14px;border-radius:10px;background:' + C.surface + ';border:1.5px solid ' + C.border + ';color:' + C.textSoft + ';font-weight:600;font-size:14px;cursor:pointer">Cancel</button>'
      + '</div>';
    this.parentElement.replaceWith(wrapper);
    document.getElementById('add-step-ta').focus();
    document.getElementById('add-step-no').addEventListener('click', function() { render(); });
    document.getElementById('add-step-ok').addEventListener('click', function() {
      var val = document.getElementById('add-step-ta').value;
      if (!val || !val.trim()) { render(); return; }
      editorSel.d[addDi].t.splice(after + 1, 0, val.trim());
      for (var i = after + 1; i < editorSel.d[addDi].t.length; i++) {
        editorChanges[editorSel.i + '-' + addDi + '-' + i] = editorSel.d[addDi].t[i];
      }
      render();
    });
  }));
}

function revertStep(idx) {
  const r = editorSel; const origR = R.find(x => x.i === r.i);
  if (origR && origR.d[editorDi] && origR.d[editorDi].t[idx] !== undefined) r.d[editorDi].t[idx] = origR.d[editorDi].t[idx];
  delete editorChanges[r.i + '-' + editorDi + '-' + idx];
  editorStepIdx = null; editorStepVal = ''; render();
}

/* ═══ BULK UPDATE (Paste PDF) ═══ */
// Parses raw text pasted from MiWay PDFs into route update objects.
// Handles single or multiple routes. Auto-detects route boundaries by the
// header format: "<NAME> <NUMBER>\nSERVICE: <s>\nREVISED: <date>"
function parseBulkPdfText(raw) {
  if (!raw || !raw.trim()) return { routes: [], errors: ['No text provided.'] };
  var text = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  // Collapse fancy dashes
  text = text.replace(/[\u2013\u2014]/g, '-').replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');

  var monthMap = {JAN:'JA',FEB:'FE',MAR:'MR',APR:'AP',MAY:'MY',JUN:'JN',JUL:'JL',AUG:'AU',SEP:'SE',OCT:'OC',NOV:'NO',DEC:'DE'};
  function toRevCode(dateStr) {
    // Accepts "27 APR 2026" or "APR 27, 2026" or "2026-04-27" etc. Returns "27AP26".
    if (!dateStr) return '';
    var s = dateStr.trim().toUpperCase();
    var m = s.match(/(\d{1,2})\s+([A-Z]{3})[A-Z]*\s+(\d{2,4})/);
    if (m) { var mon = monthMap[m[2]] || m[2].slice(0,2); var y = m[3].slice(-2); return m[1].padStart(2,'0') + mon + y; }
    m = s.match(/([A-Z]{3})[A-Z]*\s+(\d{1,2}),?\s+(\d{2,4})/);
    if (m) { var mon = monthMap[m[1]] || m[1].slice(0,2); var y = m[3].slice(-2); return m[2].padStart(2,'0') + mon + y; }
    m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m) { var months=['','JA','FE','MR','AP','MY','JN','JL','AU','SE','OC','NO','DE']; return m[3] + months[parseInt(m[2],10)] + m[1].slice(-2); }
    return dateStr.trim().toUpperCase().replace(/\s+/g,'');
  }

  // Split by header markers. A header looks like "<TITLE WORDS> <NUMBER>"
  // immediately followed on the next nonblank line by "SERVICE:".
  // We'll scan lines.
  var lines = text.split('\n').map(function(l){ return l.trim(); });
  var routes = [];
  var errors = [];

  // Find all header indices
  var headerIdxs = [];
  for (var i = 0; i < lines.length - 2; i++) {
    // Match a line ending with a route number (letters/digits), followed by SERVICE: within next 3 lines
    var m = lines[i].match(/^(.+?)\s+(\d{1,3}[A-Z]?)$/);
    if (m) {
      // Check next 1-3 lines for SERVICE:
      var svcFound = false;
      for (var k = 1; k <= 3 && i + k < lines.length; k++) {
        if (/^SERVICE\s*:/i.test(lines[i+k])) { svcFound = true; break; }
      }
      if (svcFound) headerIdxs.push(i);
    }
  }

  if (headerIdxs.length === 0) {
    errors.push('Could not find any route headers. Expected lines like: "BLOOR 3" followed by "SERVICE: DAILY".');
    return { routes: [], errors: errors };
  }

  // Group headers by route number. Same route can have multiple "pages" (EAST/WEST split).
  var byRouteNum = {};
  for (var h = 0; h < headerIdxs.length; h++) {
    var start = headerIdxs[h];
    var end = (h + 1 < headerIdxs.length) ? headerIdxs[h+1] : lines.length;
    var hdrLine = lines[start];
    var mm = hdrLine.match(/^(.+?)\s+(\d{1,3}[A-Z]?)$/);
    var routeName = mm[1].trim();
    var routeNum = mm[2].trim();

    // Extract SERVICE: and REVISED: within this chunk
    var service = '', revised = '';
    for (var j = start + 1; j < Math.min(start + 10, end); j++) {
      var sm = lines[j].match(/^SERVICE\s*:\s*(.+)$/i);
      if (sm) service = sm[1].trim();
      var rm = lines[j].match(/^REVISED\s*:\s*(.+)$/i);
      if (rm) revised = rm[1].trim();
    }

    // Body starts after SERVICE:/REVISED: lines, skip blanks
    var bodyStart = start + 1;
    while (bodyStart < end && (lines[bodyStart] === '' || /^SERVICE\s*:/i.test(lines[bodyStart]) || /^REVISED\s*:/i.test(lines[bodyStart]))) bodyStart++;

    var chunk = lines.slice(bodyStart, end);

    if (!byRouteNum[routeNum]) byRouteNum[routeNum] = { i: routeNum, n: routeName, s: service, r: revised, chunks: [] };
    byRouteNum[routeNum].chunks.push(chunk);
  }

  // For each route, parse directions from all chunks
  Object.keys(byRouteNum).forEach(function(rn) {
    var entry = byRouteNum[rn];
    var allDirs = [];
    entry.chunks.forEach(function(chunk) {
      var dirs = parseChunkDirections(chunk);
      allDirs = allDirs.concat(dirs);
    });
    if (allDirs.length === 0) {
      errors.push('Route ' + rn + ': found header but no direction steps could be parsed.');
      return;
    }
    routes.push({
      i: entry.i,
      n: entry.n,
      s: normalizeService(entry.s),
      r: toRevCode(entry.r) || entry.r,
      d: allDirs
    });
  });

  return { routes: routes, errors: errors };
}

function normalizeService(s) {
  if (!s) return '';
  var u = s.toUpperCase().replace(/\s+/g, ' ').trim();
  if (/MONDAY\s+TO\s+FRIDAY/.test(u)) return 'MON-FRI';
  if (/MONDAY\s+TO\s+SATURDAY/.test(u)) return 'MON-SAT';
  if (/DAILY/.test(u)) return 'DAILY';
  return u;
}

// Parse a chunk (array of lines under ONE header) into directions array.
// A direction starts with a label line like "EAST:", "WEST AM:", "NORTH ALTERNATE:", etc.
// Followed by step lines, ending at next label or list section.
function parseChunkDirections(chunk) {
  var result = [];
  var curLabel = null;
  var curSteps = [];

  function flush() {
    if (curLabel && curSteps.length > 0) {
      // Post-process: join wrapped lines (PDF line breaks mid-instruction)
      curSteps = joinWrappedLines(curSteps);
      result.push({ l: normalizeLabel(curLabel), t: curSteps.slice() });
    }
    curSteps = [];
  }

  // Heuristic: a direction label line ends with ":" and contains a direction keyword OR uses terms like "ALTERNATE"
  var dirRx = /^((?:NORTH|SOUTH|EAST|WEST|INBOUND|OUTBOUND|LOOP)[A-Z0-9\s\-\(\)\/&,\.]*)\s*:\s*$/i;
  // Sub-headers that shouldn't break directions (like "EAST STOPS:", "NORTH STOPS:")
  var stopsHdrRx = /^(NORTH|SOUTH|EAST|WEST)\s+STOPS\s*:?\s*$/i;
  // Pick up & drop off sections
  var puHdrRx = /^(NORTH|SOUTH|EAST|WEST)\s+PICK\s*UP.*:?\s*$/i;
  // "PICK UP AND DROP OFF AT EAST STOPS..." intro
  var puIntroRx = /PICK\s*UP\s+AND\s+DROP\s+OFF/i;

  var inStopsList = false;

  for (var i = 0; i < chunk.length; i++) {
    var ln = chunk[i];
    if (!ln) continue;

    // Check stops/pickup headers FIRST (otherwise "EAST STOPS:" gets matched as an EAST direction)
    if (stopsHdrRx.test(ln) || puHdrRx.test(ln) || puIntroRx.test(ln)) {
      if (curLabel) {
        curSteps.push(ln.replace(/:$/, '').trim() + ':');
      }
      inStopsList = true;
      continue;
    }

    // Direction label?
    var dm = ln.match(dirRx);
    if (dm) {
      flush();
      curLabel = dm[1].trim();
      inStopsList = false;
      continue;
    }

    // If we're in a stops list, include the lines verbatim as steps
    if (inStopsList && curLabel) {
      curSteps.push(ln);
      continue;
    }

    // Regular step line
    if (curLabel) {
      curSteps.push(ln);
    }
  }
  flush();
  return result;
}

// PDF text often wraps a single instruction across multiple lines.
// This function detects continuation lines and merges them with the previous step.
function joinWrappedLines(steps) {
  var out = [];
  var stepStartRx = /^(L\s*~|R\s*~|LEFT\s|RIGHT\s|TURN\s|CONTINUE\b|DEPART\b|EXIT\b|ENTER\b|FOLLOW\b|CROSS\b|KEEP\b|STAY\b|MERGE\b|SERVICE\b|PROCEED\b|GO\b|MOVE\b|USE\b|POSITION\b|LAYOVER\b|NOTE\b|PICK\b|DROP[-\s]?OFF\b|DO\s+NOT\b|AFTER\b|BEFORE\b|START\b|UNLOAD\b|LOAD\b|RECIRCULATE\b|RETURN\b|WHEN\b|IF\b|AHEAD\b|AROUND\b|OUT\b|REMAIN\b|BEGIN\b|BOARD\b|SLIGHT\b)/i;
  // Ends with an "open" connective that suggests continuation
  var endsOpen = /\b(INTO|ONTO|TO|AT|AND|OR|FROM|OF|IN|ON|FOR|THE|A|AN|ALL|VIA|TOWARDS?|ACROSS|UNDER|OVER|\&|,|\-)\s*$/i;
  // Next-line patterns that are clearly a suffix of the previous line (bare platform references only).
  // IMPORTANT: "DROP-OFF PLATFORM n" should NOT be merged — it's a distinct instruction.
  var suffixRx = /^(PLATFORM\b|PLAT\s|P\d+\b|STATIONS?\b|ETOBICOKE|MISSISSAUGA|TORONTO|BRAMPTON|OAKVILLE)/i;
  function isShortAllCapsTail(ln) {
    if (/^[LR]~/.test(ln)) return false;
    if (stepStartRx.test(ln)) return false;
    var words = ln.split(/\s+/);
    return words.length <= 3 && /^[A-Z][A-Z0-9 \/\-\&]+$/.test(ln);
  }

  var i = 0;
  while (i < steps.length) {
    var cur = steps[i];
    while (i + 1 < steps.length) {
      var nxt = steps[i+1];
      // Never merge if current line is a section header (ends with colon)
      if (/:$/.test(cur)) break;
      var shouldMerge = false;
      // 1. Previous line ends with open connective AND next doesn't start a new step
      if (endsOpen.test(cur) && !stepStartRx.test(nxt)) shouldMerge = true;
      // 2. Next line is a bare suffix like "PLATFORM 11" or "STATIONS TO RENFORTH P7"
      else if (suffixRx.test(nxt)) shouldMerge = true;
      // 3. Next line is a short all-caps tail (like "ETOBICOKE")
      else if (isShortAllCapsTail(nxt)) shouldMerge = true;

      if (shouldMerge) {
        cur = cur + ' ' + nxt;
        i++;
      } else break;
    }
    out.push(abbrevStep(cur));
    i++;
  }
  return out;
}

function normalizeLabel(lbl) {
  // Examples to preserve: "EAST", "WEST", "EAST AM", "NORTH ALTERNATE WESTWOOD TO HUMBER COLLEGE"
  var s = lbl.toUpperCase().trim();
  s = s.replace(/\s+MONDAY\s+TO\s+FRIDAY/g, '(M-F)');
  s = s.replace(/\s+SATURDAY\s*\/?\s*SUNDAY\s*\/?\s*HOLIDAY/g, '(Sat/Sun)');
  s = s.replace(/\s+ALTERNATE\s+ROUTING\s+DUE\s+TO\s+DELAYS/g, '(Alt Delays)');
  s = s.replace(/\s+ALTERNATE/g, '(Alt)');
  s = s.replace(/\s+VIA\s+/g, ' via ');
  s = s.replace(/\s+AM\b/g, '(AM)');
  s = s.replace(/\s+PM\b/g, '(PM)');
  s = s.replace(/\s+SELECT\s+TRIPS?/gi, '(Select Trips)');
  return s.replace(/\s+/g, ' ').trim();
}

// Convert wordy PDF step lines into the shorter L~/R~ format used in this app.
function abbrevStep(ln) {
  var s = ln.trim();
  // Strip whitespace around ~ in L~/R~
  s = s.replace(/^L\s*~\s*/i, 'L~').replace(/^R\s*~\s*/i, 'R~');
  // Already in L~/R~ form?
  if (/^[LR]~/.test(s)) {
    // Apply term replacements
    return applyTermReplacements(s);
  }
  // Normalize turn phrases
  var m = s.match(/^LEFT\s+(?:ON(?:TO)?|AT|INTO|TURN)\s+(.+)$/i);
  if (m) return 'L~' + applyTermReplacements(m[1].trim());
  m = s.match(/^RIGHT\s+(?:ON(?:TO)?|AT|INTO|TURN)\s+(.+)$/i);
  if (m) return 'R~' + applyTermReplacements(m[1].trim());
  m = s.match(/^TURN\s+LEFT\s+(?:ON(?:TO)?)?\s*(.+)$/i);
  if (m) return 'L~' + applyTermReplacements(m[1].trim());
  m = s.match(/^TURN\s+RIGHT\s+(?:ON(?:TO)?)?\s*(.+)$/i);
  if (m) return 'R~' + applyTermReplacements(m[1].trim());
  return applyTermReplacements(s);
}

function applyTermReplacements(s) {
  return s.replace(/\bEASTBOUND\b/g, 'EB')
          .replace(/\bWESTBOUND\b/g, 'WB')
          .replace(/\bNORTHBOUND\b/g, 'NB')
          .replace(/\bSOUTHBOUND\b/g, 'SB')
          .replace(/\bNORTH\s+OF\b/g, 'N OF')
          .replace(/\bSOUTH\s+OF\b/g, 'S OF')
          .replace(/\bEAST\s+OF\b/g, 'E OF')
          .replace(/\bWEST\s+OF\b/g, 'W OF')
          .replace(/\bCONTINUE\s+EAST\b/g, 'CONTINUE E')
          .replace(/\bCONTINUE\s+WEST\b/g, 'CONTINUE W')
          .replace(/\bCONTINUE\s+NORTH\b/g, 'CONTINUE N')
          .replace(/\bCONTINUE\s+SOUTH\b/g, 'CONTINUE S')
          .replace(/\bPLATFORM\s+([A-Z])\b/g, 'PLAT $1')
          .replace(/\bPLATFORM\s+(\d+)\b/g, 'P$1')
          .replace(/\bCITY\s+CENTRE\s+TRANSIT\s+TERMINAL\b/gi, 'CCTT')
          .replace(/\bINTO\s+THE\s+CCTT\b/gi, 'INTO CCTT')
          .replace(/\bEXIT\s+THE\s+CCTT\b/gi, 'EXIT CCTT')
          .replace(/\bTHE\s+CCTT\b/gi, 'CCTT')
          .replace(/\bCITY\s+CENTRE\s+TERMINAL\b/gi, 'CCTT')
          .replace(/\bMEADOWVALE\s+TOWN\s+CENTRE\s+TERMINAL\b/gi, 'MEADOWVALE TC')
          .replace(/\bBUS\s+STOP\s+(\d+)/gi, 'STOP $1')
          .replace(/\s+/g, ' ')
          .trim();
}

function applyBulkUpdates() {
  if (!bulkParsed || !bulkParsed.routes) return;
  bulkParsed.routes.forEach(function(nr) {
    var idx = routes.findIndex(function(x) { return x.i === nr.i; });
    if (idx >= 0) {
      // Preserve existing name (its capitalization) and service when updating.
      // Only overwrite if the new value is present.
      if (nr.s) routes[idx].s = nr.s;
      if (nr.r) routes[idx].r = nr.r;
      routes[idx].d = nr.d;
    } else {
      // New route: title-case the name if it's all caps
      if (/^[A-Z0-9\s\-]+$/.test(nr.n)) {
        nr.n = nr.n.toLowerCase().replace(/\b(\w)/g, function(m){ return m.toUpperCase(); });
      }
      routes.push(nr);
    }
  });
  Object.keys(editorChanges).forEach(function(k) { delete editorChanges[k]; });
}

/* ═══ EXPORT ═══ */
function exportFile() {
  var newRoutesJson = JSON.stringify(routes, null, 0);
  var currentHtml = document.documentElement.outerHTML;
  var newHtml = currentHtml.replace(/const R = \[[\s\S]*?\];(\s*\n\s*\/\/ Deep clone)/, 'const R = ' + newRoutesJson + ';$1');
  
  // Direct blob download
  var blob = new Blob([newHtml], {type: 'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'miway-route-guide-updated.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);

  // Show success message inline
  var exportBtn = document.getElementById('btn-export') || document.getElementById('btn-export-detail');
  if (exportBtn) {
    exportBtn.textContent = '\u2713 Downloaded!';
    exportBtn.style.background = C.green;
    setTimeout(function(){ render(); }, 2000);
  }
}

function buildCol(d, adi, d2, adi2, splitMode, forceSmall) {
  // splitMode: 'auto' (default), 'single' (force 1 col), 'split' (force 2 col)
  if (!splitMode) splitMode = 'auto';
  const AUTO_SPLIT = 20;
  const totalSteps = d.t.length + (d2 ? d2.t.length : 0);
  const pfs = (styleMode === 'classic' && forceSmall && totalSteps > 20) ? 14 : fs;
  function renderStepItems(dir, dirIdx) {
    const items = [];
    const isClassic = styleMode === 'classic';
    dir.t.forEach((step, si) => {
      const k = nk(sel.i, dirIdx, si);
      if (hid[k]) return;
      const tp = gt(step), tx = edits[k] || gf(step), hn = notes[k];
      const isHeader = isHeaderStep(step) || isHeaderStep(tx);
      const col = isHeader ? '#d97706' : (tp === 'right' ? '#16a34a' : tp === 'left' ? '#dc2626' : '#2563eb');
      let item;
      if (isClassic) {
        const arrow = isHeader ? '&#9873;' : (tp === 'right' ? '&#10145;' : tp === 'left' ? '&#11013;' : '&#9679;');
        const lbl = isHeader ? '' : (tp === 'right' ? 'RIGHT' : tp === 'left' ? 'LEFT' : '');
        const txtSize = isHeader ? Math.max(pfs, pfs + 1) : pfs;
        const txtWeight = isHeader ? '900' : '600';
        const txtColor = isHeader ? '#d97706' : '#000';
        const rowBg = isHeader ? 'background:#fef3e2;' : '';
        item = `<div style="display:flex;gap:5px;align-items:flex-start;padding:5px 6px;border-bottom:1px solid #e0e0e0;${rowBg}">`
          + `<div style="min-width:20px;font-size:11px;font-weight:700;color:#999;text-align:right;padding-top:2px">${si + 1}</div>`
          + `<div style="min-width:24px;font-size:${tp === 'action' ? Math.max(11,pfs-5) : Math.max(19,pfs+1)}px;text-align:center;color:${col}">${arrow}</div>`
          + `<div style="flex:1">${lbl ? `<div style="font-size:${Math.max(9,pfs-7)}px;font-weight:800;color:${col}">${lbl}</div>` : ''}<div style="font-size:${txtSize}px;font-weight:${txtWeight};line-height:1.3;color:${txtColor};${isHeader ? 'letter-spacing:0.3px;' : ''}">${esc(tx)}</div></div></div>`;
        if (hn) item += `<div style="background:#fffbe6;border:1px solid #e6c200;border-radius:4px;padding:3px 8px;margin:2px 0 2px 49px;font-size:${Math.max(12,pfs-4)}px;color:#92600a;font-style:italic">&#128204; ${esc(hn)}</div>`;
      } else {
        const lrPrefix = isHeader ? '' : (tp === 'right' ? `<span style="color:#16a34a;font-weight:900;margin-right:6px">R -</span>` : tp === 'left' ? `<span style="color:#dc2626;font-weight:900;margin-right:6px">L -</span>` : '');
        const rowBg = isHeader ? 'background:#fef3e2;' : '';
        const txtWeight = isHeader ? '900' : '600';
        const txtColor = isHeader ? '#d97706' : '#000';
        const txtSize = isHeader ? Math.max(pfs, pfs + 1) : pfs;
        item = `<div style="padding:5px 6px;border-bottom:1px solid #e0e0e0;${rowBg}">`
          + `<div style="font-size:${txtSize}px;font-weight:${txtWeight};line-height:1.3;color:${txtColor};${isHeader ? 'letter-spacing:0.3px;' : ''}">${lrPrefix}${esc(tx)}</div></div>`;
        if (hn) item += `<div style="background:#fffbe6;border:1px solid #e6c200;border-radius:4px;padding:3px 8px;margin:2px 0;font-size:${Math.max(12,pfs-4)}px;color:#92600a;font-style:italic">&#128204; ${esc(hn)}</div>`;
      }
      items.push(item);
    });
    return items;
  }
  const allItems = [];
  allItems.push(...renderStepItems(d, adi));
  let separatorIdx = -1;
  if (d2) {
    separatorIdx = allItems.length;
    allItems.push(`<div style="text-align:center;margin:8px 0;padding:4px 10px;background:#f0f0f0;border-radius:6px;font-size:11px;font-weight:800;color:#555">${esc(d.l.split('(')[0].trim())} Terminal &#8595;</div>`);
    allItems.push(...renderStepItems(d2, adi2));
  }
  const dirLabel = `<div style="text-align:center;margin-bottom:8px"><span style="font-size:16px;font-weight:800;background:#222;color:#fff;padding:4px 14px;border-radius:6px">${esc(d.l)}</span></div>`;

  const shouldSplit = splitMode === 'split' || (splitMode === 'auto' && allItems.length > AUTO_SPLIT);
  if (shouldSplit && allItems.length > 1) {
    const mid = Math.ceil(allItems.length / 2);
    const col1 = allItems.slice(0, mid).join('');
    const col2 = allItems.slice(mid).join('');
    return dirLabel + `<div style="display:flex;gap:0"><div style="flex:1;padding-right:8px;border-right:1.5px dashed #ccc">${col1}</div><div style="flex:1;padding-left:8px">${col2}</div></div>`;
  }
  return dirLabel + allItems.join('');
}

function buildPrintHTML(slots, layoutMode) {
  // layoutMode: '2dir' (2 directions side by side), '2col' (1 dir split into 2 columns - supports multi)
  if (!layoutMode) layoutMode = '2dir';
  const allPicked = slots.filter(x => x !== null);
  // For 2col mode, treat each picked direction as its own page
  const p1 = (layoutMode === '2col') ? allPicked.slice(0,2) : slots.slice(0,2).filter(x => x !== null);
  const p2 = (layoutMode === '2col') ? allPicked.slice(2,4) : slots.slice(2,4).filter(x => x !== null);
  const _cpairs = getCombinedDirs(sel);
  const _splitMode = layoutMode === '2col' ? 'auto' : layoutMode === '1col' ? 'single' : 'auto';
  const _forceSmall = layoutMode === '2dir';
  function _getCol(idx) {
    const pair = _cpairs.find(p => p.i === idx);
    return pair ? buildCol(sel.d[idx], idx, sel.d[pair.j], pair.j, _splitMode, _forceSmall) : buildCol(sel.d[idx], idx, null, null, _splitMode, _forceSmall);
  }
  function renderCols(cols, addNotes) {
    if (cols.length === 0) return '';
    if (layoutMode === '1col' || layoutMode === '2col') {
      // Each direction on its own, no side-by-side
      let out = '';
      cols.forEach((c, ci) => {
        if (ci > 0) out += '<div class="page-break" style="margin-top:20px">' + header + '</div>';
        out += _getCol(c);
        if (ci === cols.length - 1 && addNotes) out += '<div style="border:1px dashed #bbb;border-radius:6px;margin:12px 0;padding:10px;min-height:60px"><div style="font-size:12px;color:#999">Notes:</div></div>';
      });
      return out;
    }
    // 2dir mode - side by side
    if (cols.length === 1) return _getCol(cols[0]) + (addNotes ? '<div style="border:1px dashed #bbb;border-radius:6px;margin:12px 0;padding:10px;min-height:60px"><div style="font-size:12px;color:#999">Notes:</div></div>' : '');
    return `<div style="display:flex;gap:0"><div style="flex:1;padding-right:10px;border-right:2px solid #999">${_getCol(cols[0])}</div><div style="flex:1;padding-left:10px">${_getCol(cols[1])}</div></div>`;
  }
  const header = `<div style="border-bottom:3px solid #111;padding-bottom:6px;margin-bottom:10px"><div style="display:flex;align-items:baseline;justify-content:center;position:relative"><div style="font-size:22px;font-weight:800;text-align:center;flex:1">Route ${esc(sel.i)} &mdash; ${esc(sel.n)}</div><div style="position:absolute;right:0;font-size:9px;font-weight:400;color:#ddd">Gurjinder Singh</div></div></div>`;
  let body = `<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Route ${esc(sel.i)} ${esc(sel.n)}</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;color:#111;padding:12px}
    @page{margin:5mm}@media print{body{padding:4px}.page-break{page-break-before:always}}</style></head><body>
    ${header}${renderCols(p1, p2.length === 0)}`;
  if (p2.length > 0) body += `<div class="page-break" style="margin-top:20px">${header}${renderCols(p2, true)}</div>`;
  body += '<div style="text-align:right;margin-top:20px;padding-top:8px;border-top:1px solid #e0e0e0;font-size:9px;color:#bbb;font-style:italic">SAT SRI AKAAL</div>';
  body += '</body></html>';
  return body;
}

function doPrint(slots, layoutMode) {
  var html = buildPrintHTML(slots, layoutMode);
  var w = window.open('', '_blank');
  if (w) {
    w.document.write(html);
    w.document.close();
    setTimeout(function() { w.print(); }, 250);
    render();
  } else {
    // fallback if popup blocked: render inline and auto-print
    var body = html.replace(/^[\s\S]*<body>/, '').replace(/<\/body>[\s\S]*$/, '');
    document.getElementById('app').innerHTML = '<div style="background:#fff;color:#111;min-height:100vh;padding:12px;font-family:Arial,sans-serif">' + body + '</div>';
    setTimeout(function() { window.print(); setTimeout(function() { render(); }, 500); }, 250);
  }
}

// Browser back button support
function pushView(v) {
  try { history.pushState({ view: v }, ''); } catch(e) {}
}

window.addEventListener('popstate', function (e) {
  if (view === 'detail') {
    view = 'list'; sel = null; q = ''; combinedView = null; es_key = null; render();
  } else if (view === 'editorDetail') {
    view = 'editor'; editorStepIdx = null; render();
  } else if (view === 'bulkUpdate') {
    view = 'editor'; render();
  } else if (view === 'editor') {
    view = 'list'; render();
  } else {
    try { history.back(); } catch(e) {}
  }
});

// Push initial state
try { history.replaceState({ view: 'list' }, ''); } catch(e) {}

try {
  render();
} catch (err) {
  document.getElementById('app').innerHTML = '<div style="padding:20px;font-family:sans-serif;color:#c00"><h3>Error loading app</h3><pre style="white-space:pre-wrap;font-size:12px">' + (err && err.stack ? err.stack : err) + '</pre></div>';
}
</script>
</body>
